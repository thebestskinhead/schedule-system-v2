version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: schedule_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Schedule@2024
      MYSQL_DATABASE: schedule_system_v2
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/migrations:/docker-entrypoint-initdb.d/migrations
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: schedule_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Schedule@2024
      DB_NAME: schedule_system_v2
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql

volumes:
  mysql_data:
