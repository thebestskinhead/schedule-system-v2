# ============================================
# 排班管理系统 V2 - Docker Compose 配置
# ============================================

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: schedule-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Schedule@2024}
      MYSQL_DATABASE: ${DB_NAME:-schedule_system_v2}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-Schedule@2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - schedule-net

  # ---- 排班应用 ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schedule-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Schedule@2024}
      DB_NAME: ${DB_NAME:-schedule_system_v2}
      PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - schedule-net

volumes:
  mysql_data:

networks:
  schedule-net:
    driver: bridge
